<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ═══════════════════════════════════════════════
       DAILY OS v2.0 — App Shell
       All content is rendered by JS modules.
       This file is the entry point for the PWA.
       ═══════════════════════════════════════════════ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily OS" />
  <meta name="theme-color" content="#080808" />
  <meta name="description" content="Your personal operating system for career, physical, and spiritual growth." />

  <title>Daily OS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- ─── CSS — loaded in dependency order ─────────
       tokens first (variables), then global components,
       then per-page styles.
       IMPORTANT: filenames must EXACTLY match GitHub (case-sensitive on Vercel).
       Uncomment each line as you upload that page's CSS file.
       ─────────────────────────────────────────────── -->
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/nav.css" />
  <link rel="stylesheet" href="/css/today.css" />
  <link rel="stylesheet" href="/css/timer.css" />
  <!-- <link rel="stylesheet" href="/css/weekly.css" />     — uncomment when weekly.css is uploaded -->
  <!-- <link rel="stylesheet" href="/css/analytics.css" />  — uncomment when analytics.css is uploaded -->
  <!-- <link rel="stylesheet" href="/css/spiritual.css" />  — uncomment when spiritual.css is uploaded -->
  <!-- <link rel="stylesheet" href="/css/settings.css" />   — uncomment when settings.css is uploaded -->

  <!-- Google Fonts: DM Serif Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Supabase CDN — NO defer. Must be fully executed before
       any module script runs, because supabase.js reads window.supabase. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       DEBUG ERROR OVERLAY
       Catches JS errors and module load failures.
       Shows a red banner on screen so you can see
       what broke without opening DevTools.
       Remove this block once the app is stable.
       ═══════════════════════════════════════════════ -->
  <div id="error-overlay" style="
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #c87070;
    color: #fff;
    padding: 14px 16px 14px 16px;
    z-index: 99999;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 60vh;
    overflow-y: auto;
    border-bottom: 2px solid #a85050;
  "></div>

  <!-- Error capture — MUST be a regular script (not type=module)
       so it runs before modules and can catch their errors. -->
  <script>
    (function () {
      var overlay = document.getElementById('error-overlay');
      var msgs = [];

      function showError(msg) {
        msgs.push(msg);
        overlay.style.display = 'block';
        overlay.textContent = '⚠ JS Error — tap to dismiss\n\n' + msgs.join('\n─────────────────\n');
        overlay.onclick = function () { overlay.style.display = 'none'; };
      }

      // Catches runtime errors in modules and regular scripts
      window.addEventListener('error', function (e) {
        var file = e.filename ? e.filename.replace(location.origin, '') : '(unknown file)';
        showError('Error: ' + e.message + '\nFile: ' + file + ' line ' + e.lineno);
      });

      // Catches unhandled promise rejections (very common in async module code)
      window.addEventListener('unhandledrejection', function (e) {
        var reason = e.reason
          ? (e.reason.message || String(e.reason))
          : 'Unknown promise rejection';
        showError('Unhandled Promise: ' + reason);
      });

      // Fallback: if nothing has hidden the loading screen after 8 seconds,
      // the module graph probably failed silently (e.g. a 404 on a dependency).
      // Surface a hint so you know to check the browser Console > Network tab.
      setTimeout(function () {
        var loader = document.getElementById('app-loading');
        if (loader && !loader.classList.contains('hidden')) {
          showError(
            'Loading timeout — a JS module likely returned 404.\n' +
            'Open browser DevTools → Console or Network tab to find the failing file.\n' +
            'Common causes: wrong filename capitalisation, missing file on GitHub.'
          );
        }
      }, 8000);
    })();
  </script>

  <!-- ═══════════════════════════════════════════════
       APP LOADING SCREEN
       Shown while auth state resolves.
       Hidden by auth.js once session is determined.
       ═══════════════════════════════════════════════ -->
  <div id="app-loading" class="app-loading" aria-hidden="true">
    <div class="app-loading__logo">
      <span class="app-loading__wordmark">Daily OS</span>
    </div>
    <div class="app-loading__spinner" role="status" aria-label="Loading"></div>
  </div>

  <!-- ═══════════════════════════════════════════════
       AUTH SCREEN
       Shown when user is not authenticated.
       Hidden once user signs in.
       ═══════════════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen hidden" role="main" aria-label="Sign in">
    <!-- Content rendered by auth.js -->
  </div>

  <!-- ═══════════════════════════════════════════════
       APP SHELL
       Shown only when user is authenticated.
       Contains: session banner + pages + bottom nav.
       ═══════════════════════════════════════════════ -->
  <div id="app-shell" class="app-shell hidden">

    <!-- Session Banner — fixed top, visible on all pages when timer running -->
    <div id="session-banner" class="session-banner hidden" role="status" aria-live="polite">
      <div class="session-banner__inner">
        <span class="session-banner__dot" aria-hidden="true"></span>
        <span class="session-banner__mode" id="banner-mode">Focus</span>
        <span class="session-banner__time" id="banner-time">00:00</span>
        <span class="session-banner__tag" id="banner-tag"></span>
        <span class="session-banner__sync" id="sync-status" aria-label="Sync status">
          <!-- Sync indicator: 'syncing' | 'synced' | 'offline' class applied by sync.js -->
          <span class="sync-status__dot"></span>
        </span>
      </div>
    </div>

    <!-- ─── PAGES ─────────────────────────────────── -->
    <main id="pages-container" class="pages-container">

      <section
        id="page-today"
        class="page page--today"
        role="main"
        aria-label="Today"
        data-page="today"
      ></section>

      <section
        id="page-timer"
        class="page page--timer hidden"
        role="main"
        aria-label="Timer"
        data-page="timer"
      ></section>

      <section
        id="page-weekly"
        class="page page--weekly hidden"
        role="main"
        aria-label="Weekly"
        data-page="weekly"
      ></section>

      <section
        id="page-analytics"
        class="page page--analytics hidden"
        role="main"
        aria-label="Analytics"
        data-page="analytics"
      ></section>

      <section
        id="page-spiritual"
        class="page page--spiritual hidden"
        role="main"
        aria-label="Spiritual"
        data-page="spiritual"
      ></section>

      <section
        id="page-settings"
        class="page page--settings hidden"
        role="main"
        aria-label="Settings"
        data-page="settings"
      ></section>

    </main>

    <!-- ─── BOTTOM NAV ────────────────────────────── -->
    <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation">

      <button
        class="bottom-nav__tab bottom-nav__tab--active"
        data-page="today"
        aria-label="Today"
        aria-current="page"
      >
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="bottom-nav__label">Today</span>
        <span class="bottom-nav__dot" aria-hidden="true"></span>
      </button>

      <button
        class="bottom-nav__tab"
        data-page="timer"
        aria-label="Timer"
      >
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span class="bottom-nav__label">Timer</span>
        <span class="bottom-nav__dot" aria-hidden="true"></span>
      </button>

      <button
        class="bottom-nav__tab"
        data-page="weekly"
        aria-label="Weekly"
      >
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <span class="bottom-nav__label">Weekly</span>
        <span class="bottom-nav__dot" aria-hidden="true"></span>
      </button>

      <button
        class="bottom-nav__tab"
        data-page="analytics"
        aria-label="Analytics"
      >
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span class="bottom-nav__label">Analytics</span>
        <span class="bottom-nav__dot" aria-hidden="true"></span>
      </button>

      <button
        class="bottom-nav__tab"
        data-page="settings"
        aria-label="Me"
      >
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span class="bottom-nav__label">Me</span>
        <span class="bottom-nav__dot" aria-hidden="true"></span>
      </button>

    </nav>

  </div><!-- /app-shell -->

  <!-- ═══════════════════════════════════════════════
       MODAL OVERLAY — single reusable modal
       Managed by nav.js: showModal(config) / hideModal()
       ═══════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <button class="modal__close" id="modal-close" aria-label="Close modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal__body" id="modal-body">
        <!-- Content injected by showModal() -->
      </div>
      <div class="modal__footer" id="modal-footer">
        <!-- Action buttons injected by showModal() -->
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       TOAST — single reusable toast notification
       Managed by nav.js: showToast(message, type)
       ═══════════════════════════════════════════════ -->
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive" aria-atomic="true">
    <span class="toast__message" id="toast-message"></span>
  </div>

  <!-- ═══════════════════════════════════════════════
       BOTTOM SHEET — reusable action sheet
       Managed by nav.js: showSheet(config) / hideSheet()
       ═══════════════════════════════════════════════ -->
  <div id="sheet-overlay" class="sheet-overlay hidden" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet__handle" aria-hidden="true"></div>
      <div class="sheet__body" id="sheet-body">
        <!-- Content injected by showSheet() -->
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       JS MODULES — loaded in dependency order.

       CRITICAL RULE: Every filename here must EXACTLY match
       the filename on GitHub — Vercel (Linux) is case-sensitive.
       A single wrong capital letter causes a silent 404 that
       breaks the entire module graph.

       Current files: config, state, supabase, haptics, gestures,
       sync, auth, nav, timer-state, timer-html, timer, today.

       Uncomment each line below as you upload that page's JS file.
       ═══════════════════════════════════════════════ -->
  <script type="module" src="/js/config.js"></script>
  <script type="module" src="/js/state.js"></script>
  <script type="module" src="/js/supabase.js"></script>
  <script type="module" src="/js/haptics.js"></script>
  <script type="module" src="/js/gestures.js"></script>
  <script type="module" src="/js/sync.js"></script><!-- ← FIX: was "Sync.js" — capital S caused 404 on Vercel -->
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/timer-state.js"></script>
  <script type="module" src="/js/timer-html.js"></script>
  <script type="module" src="/js/timer.js"></script>
  <script type="module" src="/js/today.js"></script>
  <!-- <script type="module" src="/js/weekly.js"></script>     — uncomment when weekly.js is uploaded -->
  <!-- <script type="module" src="/js/analytics.js"></script>  — uncomment when analytics.js is uploaded -->
  <!-- <script type="module" src="/js/spiritual.js"></script>  — uncomment when spiritual.js is uploaded -->
  <!-- <script type="module" src="/js/settings.js"></script>   — uncomment when settings.js is uploaded -->

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/service-worker.js').catch(function (err) {
          console.warn('[SW] Registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
